name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"

      - name: Run tests
        run: go test -v -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint common chart
        run: helm lint charts/common/

      - name: Build dependencies
        run: helm dependency build deploy/ping-pong/

      - name: Template test
        run: helm template ping-pong deploy/ping-pong/

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/tomer-zino/ping-pong:test

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/tomer-zino/ping-pong:test
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ping-pong-test

      - name: Load image into Kind
        run: kind load docker-image ghcr.io/tomer-zino/ping-pong:test --name ping-pong-test

      - name: Install Envoy Gateway
        run: |
          helm install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --namespace envoy-gateway-system --create-namespace --wait --timeout 120s

      - name: Apply Gateway resources
        run: kubectl apply -f docs/local/gateway.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy ping-pong
        run: |
          helm dependency build deploy/ping-pong/
          helm install ping-pong deploy/ping-pong/ \
            --set common.image.tag=test \
            --set common.secret.data.token=test-secret-token

      - name: Wait for rollout
        run: kubectl rollout status deployment/ping-pong --timeout=120s

      - name: Test health endpoint
        run: |
          kubectl port-forward svc/ping-pong 8080:80 &
          sleep 3
          HEALTH=$(curl -sf http://localhost:8080/health)
          echo "$HEALTH" | grep -q '"status":"healthy"'
          echo "Health check passed"

      - name: Test ping endpoint with auth
        run: |
          PING=$(curl -sf -H "Authorization: Bearer test-secret-token" http://localhost:8080/ping)
          echo "$PING" | grep -q '"message":"pong"'
          echo "Ping endpoint passed"

      - name: Test pong endpoint with auth
        run: |
          PONG=$(curl -sf -H "Authorization: Bearer test-secret-token" http://localhost:8080/pong)
          echo "$PONG" | grep -q '"message":"ping"'
          echo "Pong endpoint passed"

      - name: Test unauthorized access is rejected
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ping)
          [ "$HTTP_CODE" = "401" ]
          echo "Unauthorized access correctly rejected"

      - name: Verify security context
        run: |
          SC=$(kubectl get pod -l app.kubernetes.io/name=ping-pong -o jsonpath='{.items[0].spec.containers[0].securityContext}')
          echo "$SC" | grep -q '"readOnlyRootFilesystem":true'
          echo "$SC" | grep -q '"allowPrivilegeEscalation":false'
          POD_SC=$(kubectl get pod -l app.kubernetes.io/name=ping-pong -o jsonpath='{.items[0].spec.securityContext}')
          echo "$POD_SC" | grep -q '"runAsNonRoot":true'
          echo "Security context verification passed"
